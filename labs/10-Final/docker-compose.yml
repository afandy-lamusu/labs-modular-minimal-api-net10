services:
  postgres:
    image: postgres:17-alpine
    container_name: modular_store_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: modular_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./ModularStore.Api
      dockerfile: Dockerfile
    container_name: modular_store_api
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Database=modular_store;Username=admin;Password=password123
      JWT_SECRET: DEVELOPMENT_ONLY_KEY_32_CHARS_LONG!!!
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
